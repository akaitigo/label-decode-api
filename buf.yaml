version: v2

modules:
  - path: src/main/proto
    name: buf.build/akaitigo/label-decode-api

lint:
  use:
    - STANDARD
    - COMMENTS
  except: []
  disallow_comment_ignores: true

breaking:
  use:
    - FILE
  except:
    - FILE_OPTION_JAVA_MULTIPLE_FILES_CHANGED
    - FILE_OPTION_JAVA_PACKAGE_CHANGED
