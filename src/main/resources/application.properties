quarkus.grpc.server.port=9090
quarkus.grpc.server.enable-reflection-service=false
%dev.quarkus.grpc.server.enable-reflection-service=true
# --- セキュリティ: API キー認証（UNAUTHENTICATED で拒否）---
# prod ではデフォルト有効。API_KEYS 未設定の場合は起動に失敗する（fail-fast）。
labeldecode.security.auth.enabled=true
labeldecode.security.auth.api-keys=${API_KEYS:}
%dev.labeldecode.security.auth.enabled=false
%test.labeldecode.security.auth.enabled=false

# --- セキュリティ: クライアント単位レート制限（RESOURCE_EXHAUSTED で拒否）---
labeldecode.security.rate-limit.enabled=true
labeldecode.security.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
labeldecode.security.rate-limit.burst-capacity=${RATE_LIMIT_BURST_CAPACITY:30}
%dev.labeldecode.security.rate-limit.enabled=false
%test.labeldecode.security.rate-limit.enabled=false

# --- TLS ---
# 証明書は環境依存のため環境変数で注入する（docs/adr/003 と README 参照）。
# QUARKUS_GRPC_SERVER_SSL_CERTIFICATE / QUARKUS_GRPC_SERVER_SSL_KEY を設定すると
# 以下と同義になり、gRPC サーバーが TLS で待ち受ける:
#   quarkus.grpc.server.ssl.certificate=/etc/tls/server.crt
#   quarkus.grpc.server.ssl.key=/etc/tls/server.key

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/labeldecode}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
